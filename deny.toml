[advisories]
version = 2
ignore = [
  # gtk-rs GTK3 bindings are unmaintained but required by wry/webview (transitive via crabide-extensions)
  "RUSTSEC-2024-0413",
  "RUSTSEC-2024-0416",
  "RUSTSEC-2024-0412",
  "RUSTSEC-2024-0418",
  "RUSTSEC-2024-0417",
  "RUSTSEC-2024-0414",
  "RUSTSEC-2024-0415",
  "RUSTSEC-2024-0420",
  "RUSTSEC-2024-0419",
  # proc-macro-error is unmaintained but required by glib-macros (transitive via wry)
  "RUSTSEC-2024-0370",
  # rsa timing sidechannel (Marvin Attack) — no fix available, only used by russh (remote-ssh feature)
  "RUSTSEC-2023-0071",
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "OFL-1.1",
    "Ubuntu-font-1.0",
    "Unicode-3.0",
    "Zlib",
]
exceptions = [
    { allow = ["ISC", "OpenSSL"], crate = "ring" },
]

[[licenses.clarify]]
crate = "ring"
expression = "ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
allow-workspace = false
deny = []
skip = []
skip-tree = [
    { crate = "wry" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
